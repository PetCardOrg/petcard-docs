name: "🐛 Bug Report"
description: "Reportar um bug encontrado no sistema"
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descrição do Bug
      description: Descreva o que aconteceu de forma clara.
      placeholder: "O que aconteceu?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para Reproduzir
      description: Lista os passos para reproduzir o bug.
      placeholder: |
        1. Vá para '...'
        2. Clique em '...'
        3. Veja o erro
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento Esperado
      description: O que deveria ter acontecido?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamento Atual
      description: O que aconteceu de fato?
    validations:
      required: true

  - type: dropdown
    id: repository
    attributes:
      label: Repositório
      options:
        - petcard-api
        - petcard-web
        - petcard-mobile
        - petcard-shared
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Se aplicável, adicione prints do erro.
    validations:
      required: false